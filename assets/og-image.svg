<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241531"/><stop offset="1" stop-color="#0b1414"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="10%" r="60%">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity=".55"/><stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="80" y="150" fill="#ffc23c" font-size="28" font-weight="800" letter-spacing="4">🌶️ ARDEN HOT SAUCE CO. · LOXAHATCHEE, FL</text>
  <text x="76" y="290" fill="#fff8e7" font-size="120" font-weight="900" letter-spacing="-1">Locally sourced</text>
  <text x="76" y="410" fill="#ffc23c" font-size="120" font-weight="900" letter-spacing="-1">gossip.</text>
  <text x="80" y="500" fill="#f3e6cf" font-size="38" font-weight="600">Imported peppers. Grown on the Arden farm,</text>
